name: Rust - pyc build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout your repo
      - uses: actions/checkout@v4

      # Build only the pyc workspace member in release mode
      - name: Build messiah-pyc
        run: cargo build --release -p messiah-pyc

      # Run tests for this member only
      - name: Test messiah-pyc
        run: cargo test -p messiah-pyc --verbose

      # Upload the binary artifact
      - name: Upload messiah-pyc binary
        uses: actions/upload-artifact@v4
        with:
          name: messiah-pyc
          path: target/release/messiah-pyc
