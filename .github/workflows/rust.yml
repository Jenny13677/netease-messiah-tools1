name: RustPython - messiah-pyc full build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # Checkout repo
      - uses: actions/checkout@v4

      # Install Rust toolchain
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Build messiah-pyc in release mode
      - name: Build messiah-pyc
        run: cargo build --release -p messiah-pyc

      # Copy RustPython stdlib folder alongside exe
      - name: Include RustPython stdlib
        run: |
          mkdir -p output
          copy /Y target\release\messiah-pyc.exe output\
          xcopy /E /I pyc\rustpython_pylib output\rustpython_pylib\

      # Upload the full folder as artifact
      - name: Upload full build
        uses: actions/upload-artifact@v4
        with:
          name: messiah-pyc-full
          path: output
