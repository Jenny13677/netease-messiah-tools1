name: Build messiah-pyc

on:
  push:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build messiah-pyc
        run: cargo build --release -p messiah-pyc

      - name: Prepare output folder
        run: |
          New-Item -ItemType Directory -Force -Path output
          Copy-Item target\release\messiah-pyc.exe output\
          if (Test-Path pyc\rustpython_pylib) {
            Copy-Item -Recurse pyc\rustpython_pylib output\rustpython_pylib
          }

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: messiah-pyc
          path: output
