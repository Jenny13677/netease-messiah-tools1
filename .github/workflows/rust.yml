name: Rust - messiah-pyc Windows build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # Checkout your repository
      - uses: actions/checkout@v4

      # Install Rust (if not preinstalled on the runner)
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Build the messiah-pyc crate in release mode
      - name: Build messiah-pyc.exe
        run: cargo build --release -p messiah-pyc

      # Run tests
      - name: Test messiah-pyc
        run: cargo test -p messiah-pyc --verbose

      # Upload the Windows executable
      - name: Upload messiah-pyc.exe
        uses: actions/upload-artifact@v4
        with:
          name: messiah-pyc-windows
          path: target\release\messiah-pyc.exe
